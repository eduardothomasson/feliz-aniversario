<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Feliz aniversário gatinha ❤️</title>

    <style>
        body {
            background: linear-gradient(to bottom, #ffb6c1, #ffc0cb);
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.25);
            padding: 35px;
            border-radius: 25px;
            width: 85%;
            max-width: 550px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.2);
        }

        img {
            width: 250px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 35px;
            margin-top: 10px;
        }

        #frase {
            font-size: 22px;
            margin-top: 20px;
            min-height: 60px;
            transition: 0.5s;
        }

        button {
            background: #ff69b4;
            border: none;
            padding: 15px 30px;
            color: white;
            border-radius: 20px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- IMAGEM DO ÁLBUM -->
        <img src="mamancos.jpg" width="250">

        <!-- BOTÃO DA MÚSICA -->
        <br>

        <button onclick="tocarMusica()">
            Tocar música do álbum 🎵
        </button>

        <h1>Feliz 18 anos, gatinha ❤️</h1>

        <p id="frase">
            Aperte no botão, lele 💕
        </p>

        <!-- BOTÃO DAS FRASES -->
        <button onclick="trocarFrase()">
            Clique aqui 💖
        </button>

        <!-- MÚSICA -->
        <audio id="musica" loop>
            <source src="musica.mp3" type="audio/mp3">
        </audio>

    </div>

    <script>

        const frases = [
            "Feliz aniversário atrasado gatinha ❤️",
            "Você desbloqueou a nova conquista dos 18 🎂",
            "Agora você pode ser presa kkkkk ",
            "Espero que possamos nos conhecer melhor mais pra frente 💕",
            "Espero que goste desse humilde presente ",
            "Um abraço ❤️"
        ];

        let indice = 0;

        function trocarFrase() {

            document.getElementById("frase").innerText =
                frases[indice];

            indice++;

            if (indice >= frases.length) {
                indice = 0;
            }
        }

        function tocarMusica() {

            const musica =
                document.getElementById("musica");

            musica.play();
        }

    </script>

</body>

</html>
